<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Flashcards</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-white text-stone-900 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md px-8">
    <h1 class="text-3xl font-bold tracking-tight text-center mb-2">Flashcards</h1>
    <p class="text-stone-400 text-sm text-center mb-8">Sign in to continue</p>

    <!-- Tabs -->
    <div class="flex gap-2 mb-6">
      <button id="tab-login" onclick="showTab('login')"
        class="flex-1 px-4 py-2 text-sm font-semibold rounded-xl bg-stone-900 text-white transition-colors">
        Log In
      </button>
      <button id="tab-register" onclick="showTab('register')"
        class="flex-1 px-4 py-2 text-sm font-semibold rounded-xl bg-white text-stone-700 border border-stone-200 transition-colors">
        Sign Up
      </button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="mb-4">
        <label class="block text-sm font-semibold mb-2">Username</label>
        <input id="login-username" type="text" autocomplete="username"
          class="w-full px-3.5 py-2.5 rounded-xl border border-stone-200 bg-stone-50 text-sm focus:outline-none focus:border-stone-800 focus:bg-white transition-colors" />
      </div>
      <div class="mb-6">
        <label class="block text-sm font-semibold mb-2">Password</label>
        <input id="login-password" type="password" autocomplete="current-password"
          class="w-full px-3.5 py-2.5 rounded-xl border border-stone-200 bg-stone-50 text-sm focus:outline-none focus:border-stone-800 focus:bg-white transition-colors" />
      </div>
      <button onclick="doLogin()"
        class="w-full px-4 py-2.5 text-sm font-semibold rounded-xl bg-stone-900 text-white hover:bg-stone-700 transition-colors">
        Log In
      </button>
      <p id="login-error" class="text-red-500 text-sm mt-3 hidden"></p>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="hidden">
      <div class="mb-4">
        <label class="block text-sm font-semibold mb-2">Username</label>
        <input id="register-username" type="text" autocomplete="username"
          class="w-full px-3.5 py-2.5 rounded-xl border border-stone-200 bg-stone-50 text-sm focus:outline-none focus:border-stone-800 focus:bg-white transition-colors" />
      </div>
      <div class="mb-6">
        <label class="block text-sm font-semibold mb-2">Password <span class="font-normal text-stone-400">(min 8 chars)</span></label>
        <input id="register-password" type="password" autocomplete="new-password"
          class="w-full px-3.5 py-2.5 rounded-xl border border-stone-200 bg-stone-50 text-sm focus:outline-none focus:border-stone-800 focus:bg-white transition-colors" />
      </div>
      <button onclick="doRegister()"
        class="w-full px-4 py-2.5 text-sm font-semibold rounded-xl bg-stone-900 text-white hover:bg-stone-700 transition-colors">
        Sign Up
      </button>
      <p id="register-error" class="text-red-500 text-sm mt-3 hidden"></p>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
